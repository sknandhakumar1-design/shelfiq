name: ShelfIQ CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            numpy==2.4.4 \
            pandas==2.3.3 \
            scikit-learn==1.8.0 \
            lightgbm==4.6.0 \
            mlflow==3.10.1 \
            pyarrow==23.0.1 \
            fastapi==0.135.2 \
            uvicorn==0.42.0 \
            joblib==1.5.3 \
            pytest==7.4.0 \
            httpx==0.25.0 \
            pytest-asyncio==0.23.8 \
            anyio==4.13.0 \
            setuptools \
            --only-binary=:all:

      - name: Run tests
        run: |
          python -m pytest tests/ -v
        env:
          PYTHONPATH: .
