name: ShelfIQ CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            numpy==1.26.4 \
            pandas==2.2.0 \
            scikit-learn==1.4.0 \
            lightgbm==4.3.0 \
            mlflow==2.3.0 \
            pyarrow==14.0.0 \
            fastapi==0.104.0 \
            uvicorn==0.24.0 \
            joblib==1.3.2 \
            pytest==7.4.0 \
            httpx==0.25.0 \
            pytest-asyncio \
            anyio \
            setuptools \
            --only-binary=:all:

      - name: Run tests
        run: |
          python -m pytest tests/ -v
        env:
          PYTHONPATH: .
